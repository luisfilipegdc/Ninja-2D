<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 1120" font-family="'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <rect width="820" height="1120" fill="#15375d"/>
  <!-- bandeirinhas -->
  <g>
    <polygon points="40,40 120,40 80,110" fill="#e84c97"/>
    <polygon points="140,40 220,40 180,110" fill="#28a8e0"/>
    <polygon points="240,40 320,40 280,110" fill="#f9c21a"/>
    <polygon points="340,40 420,40 380,110" fill="#e23b2e"/>
    <polygon points="440,40 520,40 480,110" fill="#6e5ba6"/>
    <polygon points="540,40 620,40 580,110" fill="#f9c21a"/>
    <polygon points="640,40 720,40 680,110" fill="#e84c97"/>
    <polygon points="740,40 820,40 780,110" fill="#28a8e0"/>
  </g>

  <text x="410" y="210" fill="#f9c21a" font-size="64" font-weight="800" text-anchor="middle">Monte o código 🧩</text>
  <text x="410" y="268" fill="#ffffff" font-size="32" font-weight="600" text-anchor="middle" opacity="0.92">Cada número tem uma pista do lugar!</text>

  <!-- legenda das pistas -->
  <g>
    <!-- 1a casa -->
    <rect x="60" y="330" width="700" height="150" rx="24" fill="#1d4470" stroke="#f9c21a" stroke-opacity="0.45"/>
    <text x="150" y="430" font-size="72" text-anchor="middle">🌽</text>
    <text x="240" y="400" fill="#ffffff" font-size="40" font-weight="800">Milho = 1ª casa</text>
    <text x="240" y="450" fill="#bcd4ec" font-size="28">É o número que ABRE a senha.</text>

    <!-- 2a casa -->
    <rect x="60" y="510" width="700" height="150" rx="24" fill="#1d4470" stroke="#f9c21a" stroke-opacity="0.45"/>
    <text x="150" y="610" font-size="72" text-anchor="middle">🪗</text>
    <text x="240" y="580" fill="#ffffff" font-size="40" font-weight="800">Sanfona = 2ª casa</text>
    <text x="240" y="630" fill="#bcd4ec" font-size="28">É o número do MEIO.</text>

    <!-- 3a casa -->
    <rect x="60" y="690" width="700" height="150" rx="24" fill="#1d4470" stroke="#f9c21a" stroke-opacity="0.45"/>
    <text x="150" y="790" font-size="72" text-anchor="middle">🔥</text>
    <text x="240" y="760" fill="#ffffff" font-size="40" font-weight="800">Fogueira = 3ª casa</text>
    <text x="240" y="810" fill="#bcd4ec" font-size="28">É o número que FECHA a senha.</text>
  </g>

  <!-- exemplo -->
  <g>
    <rect x="60" y="880" width="700" height="150" rx="24" fill="#2a3a5e" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="410" y="930" fill="#f9c21a" font-size="30" font-weight="800" text-anchor="middle">Exemplo de código:</text>
    <g>
      <rect x="250" y="945" width="80" height="70" rx="12" fill="#f4efe2"/>
      <text x="290" y="998" fill="#15375d" font-size="48" font-weight="800" text-anchor="middle">1</text>
      <text x="290" y="935" font-size="34" text-anchor="middle">🌽</text>

      <rect x="370" y="945" width="80" height="70" rx="12" fill="#f4efe2"/>
      <text x="410" y="998" fill="#15375d" font-size="48" font-weight="800" text-anchor="middle">2</text>
      <text x="410" y="935" font-size="34" text-anchor="middle">🪗</text>

      <rect x="490" y="945" width="80" height="70" rx="12" fill="#f4efe2"/>
      <text x="530" y="998" fill="#15375d" font-size="48" font-weight="800" text-anchor="middle">0</text>
      <text x="530" y="935" font-size="34" text-anchor="middle">🔥</text>
    </g>
  </g>

  <text x="410" y="1085" fill="#f9c21a" font-size="28" font-weight="800" text-anchor="middle">Junte cada número no lugar da sua pista! ✅</text>
</svg>
