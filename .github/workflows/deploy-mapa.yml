name: Deploy Mapa → VPS (pluzy.com.br)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 15m
          script: |
            set -e

            # Detecta onde o app foi instalado
            if [ -d /var/www/pluzy/.git ]; then
              APP_DIR=/var/www/pluzy
            elif [ -d /var/www/festajuninamarista/.git ]; then
              APP_DIR=/var/www/festajuninamarista
            else
              git clone https://github.com/luisfilipegdc/festajuninamarista.git /var/www/pluzy
              APP_DIR=/var/www/pluzy
            fi

            cd "$APP_DIR"

            # Espelha exatamente o GitHub (recupera arquivos deletados)
            git fetch origin main
            git reset --hard origin/main

            npm ci

            # Build limpo: remove o .next antigo para não sobrar chunk obsoleto
            rm -rf .next
            npm run build

            # Restart COMPLETO (não reload): garante que o processo em execução
            # sirva exatamente o build novo — evita ChunkLoadError / 400 nos chunks.
            pm2 delete mapa 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save
