name: Deploy Mapa → VPS (pluzy.com.br)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 15m
          script: |
            set -e

            # Detecta onde o app foi instalado (Codex usou /var/www/pluzy)
            if [ -d /var/www/pluzy/.git ]; then
              APP_DIR=/var/www/pluzy
            elif [ -d /var/www/festajuninamarista/.git ]; then
              APP_DIR=/var/www/festajuninamarista
            else
              # Clone inicial se ainda não existe
              git clone https://github.com/luisfilipegdc/festajuninamarista.git /var/www/pluzy
              APP_DIR=/var/www/pluzy
            fi

            cd "$APP_DIR"

            # Força o working tree a espelhar exatamente o GitHub (recupera arquivos deletados)
            git fetch origin main
            git reset --hard origin/main

            npm ci

            # Usa o .env.local já presente no servidor (configurado pelo Codex)
            npm run build

            pm2 reload mapa --update-env || pm2 start ecosystem.config.js || \
              pm2 start node_modules/.bin/next --name mapa -- start
            pm2 save
