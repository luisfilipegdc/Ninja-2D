name: VPS — Setup Inicial (rode uma única vez)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup completo da VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 20m
          script: |
            set -e

            echo "==> 1. Atualizando pacotes..."
            apt-get update -qq
            apt-get install -y -qq curl git nginx certbot python3-certbot-nginx

            echo "==> 2. Instalando Node.js 20..."
            if ! command -v node &>/dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi
            echo "Node: $(node -v) | npm: $(npm -v)"

            echo "==> 3. Instalando PM2..."
            npm install -g pm2 2>/dev/null || true
            pm2 startup systemd -u root --hp /root 2>/dev/null | grep "^sudo" | bash || true

            echo "==> 4. Clonando repositório..."
            mkdir -p /var/www
            if [ -d /var/www/festajuninamarista/.git ]; then
              git -C /var/www/festajuninamarista pull origin main
            else
              git clone https://github.com/luisfilipegdc/festajuninamarista.git /var/www/festajuninamarista
            fi

            echo "==> 5. Criando .env.local..."
            cat > /var/www/festajuninamarista/.env.local << 'ENV'
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            ENV

            echo "==> 6. Build..."
            cd /var/www/festajuninamarista
            npm ci --omit=dev
            npm run build

            echo "==> 7. Iniciando com PM2..."
            pm2 delete mapa 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save

            echo "==> 8. Configurando Nginx..."
            cat > /etc/nginx/sites-available/pluzy << 'NGINX'
            server {
                listen 80;
                listen [::]:80;
                server_name pluzy.com.br www.pluzy.com.br;

                location / {
                    proxy_pass         http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header   Upgrade $http_upgrade;
                    proxy_set_header   Connection 'upgrade';
                    proxy_set_header   Host $host;
                    proxy_set_header   X-Real-IP $remote_addr;
                    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                }

                location /_next/static/ {
                    proxy_pass http://127.0.0.1:3000/_next/static/;
                    add_header Cache-Control "public, max-age=31536000, immutable";
                }
            }
            NGINX

            ln -sf /etc/nginx/sites-available/pluzy /etc/nginx/sites-enabled/pluzy
            rm -f /etc/nginx/sites-enabled/default
            nginx -t
            systemctl reload nginx

            echo ""
            echo "=============================================="
            echo "  Setup concluído!"
            echo "  Acesse: http://pluzy.com.br/mapa"
            echo "  PM2 status: $(pm2 list | grep mapa | awk '{print $18}')"
            echo "=============================================="
