name: Deploy Mapa → VPS (pluzy.com.br)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e

            # Detecta onde o Codex instalou o app (pluzy ou festajuninamarista)
            if [ -d /var/www/pluzy ]; then
              APP_DIR=/var/www/pluzy
            else
              APP_DIR=/var/www/festajuninamarista
            fi

            cd "$APP_DIR"

            git pull origin main

            npm ci --omit=dev

            # Usa o .env.local já presente no servidor (configurado pelo Codex)
            npm run build

            pm2 reload mapa --update-env || pm2 start ecosystem.config.js || \
              pm2 start node_modules/.bin/next --name mapa -- start
            pm2 save
